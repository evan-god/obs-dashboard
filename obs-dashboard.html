<!DOCTYPE html>
<!-- OBS 直播间监控大盘 v1.3.0 | CHANGELOG.md -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBS 直播间监控大盘</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdn.jsdelivr.net/npm/flv.js@1"></script>
<style>
:root {
  --bg:#0b0f19; --card:#131a2b; --border:#1e2a3d; --borderH:#2a3a55;
  --text:#e4e9f2; --dim:#8899b4; --mute:#556680; --accent:#4080ff;
  --accentBg:rgba(64,128,255,.1); --green:#2ecc71; --greenBg:rgba(46,204,113,.1);
  --yellow:#f0b429; --yellowBg:rgba(240,180,41,.1); --red:#e74c3c;
  --redBg:rgba(231,76,60,.1); --orange:#e67e22; --radius:8px; --radiusSm:5px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ═══ TOP BAR ═══ */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,29,.94);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.logo{font-size:15px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:6px}
.logo span{color:var(--accent)}
.summary{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
.summary-item{display:flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:16px;font-size:11px;font-weight:600;background:var(--border);white-space:nowrap}
.summary-item .dot{width:6px;height:6px;border-radius:50%}
.summary-item .val{font-size:13px;margin:0 2px;color:var(--accent)}
.btn-add{padding:4px 12px;border-radius:16px;border:1px solid var(--accent);
  background:var(--accentBg);color:var(--accent);cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-add:hover{background:var(--accent);color:#fff;box-shadow:0 0 16px rgba(64,128,255,.3)}
.btn-io{padding:4px 12px;border-radius:16px;border:1px solid;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;white-space:nowrap;background:transparent}
.btn-io.export-btn{border-color:var(--green);color:var(--green)}
.btn-io.export-btn:hover{background:var(--green);color:#fff;box-shadow:0 0 12px rgba(46,204,113,.3)}
.btn-io.import-btn{border-color:var(--accent);color:var(--accent)}
.btn-io.import-btn:hover{background:var(--accent);color:#fff;box-shadow:0 0 12px rgba(64,128,255,.3)}

/* ═══ LAYOUT: SIDEBAR + MAIN ═══ */
.app-body{display:flex;height:calc(100vh - 48px);overflow:hidden}
.sidebar{width:248px;min-width:248px;height:100%;overflow-y:auto;background:rgba(13,17,29,.92);border-right:1px solid var(--border);display:flex;flex-direction:column;user-select:none}
.sidebar .side-hd{padding:10px 14px;font-size:11px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
.sidebar .side-tree{flex:1;overflow-y:auto;padding:6px 0}
.sidebar .side-ft{padding:8px 10px;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0}
.main-content{flex:1;display:flex;flex-direction:column;overflow-y:auto}

/* ═══ SIDEBAR TREE ═══ */
.tree-root{padding:0 10px}
.tree-root .tr-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:.12s;margin-bottom:2px}
.tree-root .tr-item:hover{background:rgba(255,255,255,.04)}
.tree-root .tr-item.active{background:var(--accentBg);color:var(--accent)}
.tree-root .tr-item .tr-icon{font-size:15px;flex-shrink:0}
.tree-root .tr-item .tr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-root .tr-item .tr-expand{font-size:10px;color:var(--mute);flex-shrink:0;transition:transform .2s}
.tree-root .tr-item .tr-expand.open{transform:rotate(90deg)}
.tree-loc-group{margin-left:20px;border-left:1px solid rgba(255,255,255,.06);padding-left:8px}
.tree-loc-group.collapsed{display:none}
.tree-loc-node{padding:2px 0}
.tree-loc-node .tl-header{display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:4px;font-size:11px;color:var(--dim);cursor:pointer;transition:.12s}
.tree-loc-node .tl-header:hover{background:rgba(255,255,255,.03);color:var(--text)}
.tree-loc-node .tl-header.sel{background:var(--accentBg);color:var(--accent);font-weight:600}
.tree-loc-node .tl-header .tl-icon{font-size:13px;flex-shrink:0}
.tree-loc-node .tl-header .tl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-loc-node .tl-header .tl-arr{font-size:9px;color:var(--mute);flex-shrink:0;transition:transform .2s}
.tree-loc-node .tl-header .tl-arr.open{transform:rotate(90deg)}
.tree-loc-node .tl-count{font-size:9px;color:var(--mute);margin-left:auto;flex-shrink:0}
.tree-oa-group{margin-left:20px;border-left:1px solid rgba(255,255,255,.04);padding-left:8px}
.tree-oa-group.collapsed{display:none}
.tree-oa-node{padding:1px 0}
.tree-oa-node .to-header{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:11px;color:var(--dim);cursor:pointer;transition:.12s}
.tree-oa-node .to-header:hover{background:rgba(255,255,255,.03);color:var(--text)}
.tree-oa-node .to-header.sel{background:var(--accentBg);color:var(--accent)}
.tree-oa-node .to-header .to-icon{font-size:12px;flex-shrink:0}
.tree-oa-node .to-header .to-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-oa-node .to-header .to-arr{font-size:9px;color:var(--mute);flex-shrink:0;transition:transform .2s}
.tree-oa-node .to-header .to-arr.open{transform:rotate(90deg)}
.tree-fl-group{margin-left:20px;border-left:1px solid rgba(255,255,255,.03);padding-left:8px}
.tree-fl-group.collapsed{display:none}
.tree-fl-node{padding:1px 0}
.tree-fl-node .tf-item{display:flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;font-size:10px;color:var(--mute);cursor:pointer;transition:.12s}
.tree-fl-node .tf-item:hover{background:rgba(255,255,255,.03);color:var(--text)}
.tree-fl-node .tf-item.active{background:rgba(64,128,255,.12);color:var(--accent);font-weight:600}
.tree-fl-node .tf-item .tf-icon{font-size:11px;flex-shrink:0}
.tree-fl-node .tf-item .tf-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tree-fl-node .tf-item .tf-count{font-size:9px;color:var(--mute);flex-shrink:0}

/* ═══ MAIN CONTENT HEADER ═══ */
.main-hd{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(13,17,29,.6)}
.main-hd .main-title{font-size:13px;font-weight:700;color:var(--text)}
.main-hd .main-sub{font-size:11px;color:var(--dim)}
.main-hd .btn-add-main{margin-left:auto;padding:5px 14px;border-radius:16px;border:1px solid var(--accent);background:var(--accentBg);color:var(--accent);cursor:pointer;font-size:12px;font-weight:600;transition:.2s;white-space:nowrap}
.main-hd .btn-add-main:hover{background:var(--accent);color:#fff;box-shadow:0 0 16px rgba(64,128,255,.3)}

/* ═══ LOCATION TAG (卡片上) ═══ */
.location-tag{font-size:12px;color:var(--accent);background:var(--accentBg);
  padding:2px 8px;border-radius:10px;flex-shrink:0;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;user-select:none}
.location-tag:hover{background:var(--accent);color:#fff}

/* ═══ LOCATION MANAGER MODAL ═══ */
.loc-modal .tree{margin:8px 0;max-height:380px;overflow-y:auto}
.loc-modal .tree-loc{margin-bottom:2px}
.loc-modal .tree-loc .loc-header{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;background:rgba(64,128,255,.06);border:1px solid rgba(64,128,255,.12);margin-bottom:2px}
.loc-modal .tree-loc .loc-header .loc-icon{font-size:15px}
.loc-modal .tree-loc .loc-header .loc-name{font-weight:700;font-size:13px;color:var(--accent);flex:1}
.loc-modal .tree-loc .loc-header .loc-act{font-size:10px;color:var(--dim);cursor:pointer;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);border:none;transition:.12s;white-space:nowrap}
.loc-modal .tree-loc .loc-header .loc-act:hover{color:var(--text);background:var(--border)}
.loc-modal .tree-loc .loc-header .loc-act.del:hover{color:var(--red);background:var(--redBg)}
.loc-modal .tree-loc .loc-children{margin-left:24px;border-left:1px solid var(--border);padding-left:12px}
.loc-modal .tree-oa{margin-bottom:2px}
.loc-modal .tree-oa .oa-header{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;margin-bottom:1px}
.loc-modal .tree-oa .oa-header .oa-icon{font-size:13px}
.loc-modal .tree-oa .oa-header .oa-name{font-weight:600;font-size:12px;color:var(--text);flex:1}
.loc-modal .tree-oa .oa-header .oa-act{font-size:10px;color:var(--dim);cursor:pointer;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.04);border:none;transition:.12s;white-space:nowrap}
.loc-modal .tree-oa .oa-header .oa-act:hover{color:var(--text);background:var(--border)}
.loc-modal .tree-oa .oa-header .oa-act.del:hover{color:var(--red);background:var(--redBg)}
.loc-modal .tree-oa .oa-children{margin-left:20px;border-left:1px solid var(--border);padding-left:12px}
.loc-modal .tree-fl .fl-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;font-size:11px}
.loc-modal .tree-fl .fl-row .fl-icon{font-size:11px}
.loc-modal .tree-fl .fl-row .fl-name{color:var(--dim);flex:1}
.loc-modal .tree-fl .fl-row .fl-act{font-size:9px;color:var(--dim);cursor:pointer;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.04);border:none;transition:.12s;white-space:nowrap}
.loc-modal .tree-fl .fl-row .fl-act:hover{color:var(--text);background:var(--border)}
.loc-modal .tree-fl .fl-row .fl-act.del:hover{color:var(--red);background:var(--redBg)}
.loc-modal .add-row{display:flex;gap:4px;margin-top:4px;margin-bottom:2px}
.loc-modal .add-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:11px;padding:4px 8px;border-radius:4px;outline:none}
.loc-modal .add-row input:focus{border-color:var(--accent)}
.loc-modal .add-row button{padding:4px 10px;border-radius:4px;border:1px solid var(--accent);background:var(--accentBg);color:var(--accent);cursor:pointer;font-size:11px;transition:.15s;white-space:nowrap}
.loc-modal .add-row button:hover{background:var(--accent);color:#fff}
.loc-modal .add-top{margin-top:8px;margin-bottom:0}

/* ═══ 弹窗字段 datalist 提示 ═══ */
.field datalist{}

/* ═══ GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:10px;padding:12px 16px 30px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr))}}
@media(max-width:800px){.grid{grid-template-columns:1fr}}

/* ═══ CARD ═══ */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:.2s}
.card:hover{border-color:var(--borderH)}
.card.alert{border-color:var(--red)!important;animation:pulse 2.5s infinite}
.card.offline{opacity:.55}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(231,76,60,.15)}50%{box-shadow:0 0 20px rgba(231,76,60,.3)}}

/* ═══ HEADER ═══ */
.card-header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
.card-header .left{display:flex;align-items:center;gap:8px;min-width:0}
.card-header .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card-header .rname{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-header .plt{font-size:11px;color:var(--dim);white-space:nowrap}
.card-header .acts{display:flex;gap:4px}
.card-header .acts button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;transition:.15s}
.card-header .acts button:hover{color:var(--text);background:var(--border)}

/* ═══ VIDEO AREA ═══ */
.video-area{position:relative;background:#000;aspect-ratio:16/9;overflow:hidden;cursor:pointer}
.video-area video,.video-area canvas{width:100%;height:100%;object-fit:contain}
.video-area .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.55);transition:.2s}
.video-area .play-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.8);background:rgba(64,128,255,.25);color:#fff;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:.2s}
.video-area .play-btn:hover{background:var(--accent);transform:scale(1.08);box-shadow:0 0 24px rgba(64,128,255,.5)}
.video-area .play-hint{font-size:12px;color:rgba(255,255,255,.6)}
.video-area .no-url{font-size:12px;color:var(--yellow);background:rgba(0,0,0,.6);padding:4px 12px;border-radius:12px}
.video-area .overlay .status-badges{position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:2}
.video-area .stream-badge{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap}
.video-area .stream-badge.live{background:#e74c3c;color:#fff;animation:pulse2 1.5s infinite}
.video-area .stream-badge.off{background:rgba(255,255,255,.15);color:var(--dim)}
.video-area .stream-badge.rec{background:#e67e22;color:#fff;animation:pulse2 1.5s infinite}
.video-area .stream-badge.vcam{background:#8e44ad;color:#fff}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.6}}

/* ═══ MODULE ROWS (左侧模块名 + 右侧网格对齐) ═══ */
.params-section{padding:10px 16px;display:flex;flex-direction:column;gap:5px}
.module-row{display:grid;grid-template-columns:54px 1fr;align-items:start;gap:6px;padding:6px 10px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:5px}
.module-row.detect-row{border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025)}
.module-row .m-head{display:flex;flex-direction:column;align-items:center;gap:2px;padding-top:2px}
.module-row .m-head .m-icon{font-size:16px;line-height:1}
.module-row .m-head .m-title{font-size:9px;color:var(--mute);font-weight:700;text-align:center;line-height:1.3}
.module-row .m-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1px 12px}
.module-row .m-item{display:flex;justify-content:space-between;align-items:center;gap:6px;font-size:11px;padding:1px 0;min-width:0}
.module-row .m-label{color:var(--dim);font-size:10px;flex-shrink:0}
.module-row .m-value{font-weight:600;color:var(--text);font-size:11px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.module-row .m-value.ok{color:var(--green)}
.module-row .m-value.warn{color:var(--yellow)}
.module-row .m-value.bad{color:var(--red)}
.module-row .m-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.module-row .m-dot.ok{background:var(--green)}
.module-row .m-dot.warn{background:var(--yellow)}
.module-row .m-dot.bad{background:var(--red)}
@media(max-width:800px){.module-row{grid-template-columns:44px 1fr;gap:4px}.module-row .m-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}.module-row .m-value{font-size:10px}}

/* ═══ MIC VOLUME METER ═══ */
.mic-meter-item{grid-column:1/-1}
.mic-bar-wrap{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.mic-meter{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.mic-meter-bar{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;position:relative}
.mic-meter-fill{height:100%;border-radius:3px;transition:width 80ms linear;width:0%;
  background:linear-gradient(to right,#2ecc71 0%,#2ecc71 30%,#f0b429 50%,#f0b429 60%,#e67e22 75%,#e74c3c 88%,#e74c3c 100%)}
.mic-meter-db{font-size:10px;font-weight:600;color:var(--dim);min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
.mic-meter-db.muted{color:var(--red)}
.mic-scale{display:flex;justify-content:space-between;padding:0 2px}
.mic-scale span{font-size:7px;color:var(--mute);min-width:18px;text-align:center}
.mic-scale span.s0{color:var(--red);font-weight:700}

/* ═══ URL ROW ═══ */
.url-row{padding:8px 16px;display:flex;flex-direction:column;gap:5px;border-top:1px solid rgba(255,255,255,.03)}
.url-item{display:flex;align-items:center;gap:6px;font-size:11px}
.url-item .ul{color:var(--mute);white-space:nowrap;min-width:56px}
.url-item .uv{font-family:monospace;font-size:11px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.2);padding:2px 8px;border-radius:4px;flex:1}
.url-item .uv.auto{color:var(--green)}
.url-item .uv.manual{color:var(--accent)}
.url-item .copy-btn{font-size:10px;background:var(--border);border:none;color:var(--dim);cursor:pointer;padding:2px 8px;border-radius:4px;white-space:nowrap}
.url-item .copy-btn:hover{color:var(--text);background:var(--accent)}

/* ═══ FOOTER ═══ */
.card-footer{padding:6px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:11px;color:var(--mute);gap:8px}
.card-footer .fi{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-footer .ft{white-space:nowrap}

/* ═══ EMPTY ═══ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center;color:var(--dim)}
.empty-state .icon{font-size:48px}
.empty-state h3{font-size:16px;color:var(--text)}
.empty-state p{font-size:13px;max-width:360px;line-height:1.6}
.empty-state .btn-add-large{padding:10px 28px;border-radius:24px;border:1px solid var(--accent);background:var(--accentBg);color:var(--accent);cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
.empty-state .btn-add-large:hover{background:var(--accent);color:#fff}

/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:420px;max-width:94vw;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.modal h3{font-size:16px;margin-bottom:16px}
.modal .field{margin-bottom:14px}
.modal .field label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px}
.modal .field input,.modal .field select{width:100%;padding:8px 12px;border-radius:var(--radiusSm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.modal .field input:focus,.modal .field select:focus{border-color:var(--accent)}
.modal .field .hint{font-size:11px;color:var(--mute);margin-top:3px}
.modal .actions-row{display:flex;gap:10px;justify-content:flex-end}
.modal .actions-row button{padding:7px 18px;border-radius:var(--radiusSm);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:13px}
.modal .actions-row button.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal .actions-row button.primary:hover{box-shadow:0 0 12px rgba(64,128,255,.3)}
.modal .actions-row button.danger{background:var(--red);border-color:var(--red);color:#fff}

/* ═══ LOG WIDGET ═══ */
/* ── 日志小部件（侧边栏底部）── */
.log-widget{width:100%;max-height:220px;overflow:hidden;border-radius:6px;border:1px solid var(--border);background:rgba(13,17,29,.6);transition:max-height .3s;margin-bottom:6px}
.log-widget.collapsed{max-height:30px}
.log-widget .log-header{cursor:pointer;padding:5px 10px;display:flex;align-items:center;justify-content:space-between;font-size:12px;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border);background:rgba(64,128,255,.06);user-select:none}

<script>
// ═══════════════════════════════════════
// 纯 JS SHA-256（同步）
// ═══════════════════════════════════════
const OBSAuth=(()=>{
  function sha256(msg){
    const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
    let bytes=[];
    for(let i=0;i<msg.length;i++){const c=msg.charCodeAt(i);if(c<0x80)bytes.push(c);else if(c<0x800){bytes.push(0xc0|(c>>6),0x80|(c&0x3f))}else{bytes.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f))}}
    const bl=bytes.length*8;bytes.push(0x80);
    while((bytes.length%64)!==56)bytes.push(0);
    bytes.push(0,0,0,0);bytes.push((bl>>>24)&0xff,(bl>>>16)&0xff,(bl>>>8)&0xff,bl&0xff);
    const H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    for(let i=0;i<bytes.length;i+=64){
      const W=new Array(64);
      for(let t=0;t<16;t++)W[t]=(bytes[i+t*4]<<24)|(bytes[i+t*4+1]<<16)|(bytes[i+t*4+2]<<8)|bytes[i+t*4+3];
      for(let t=16;t<64;t++){const s0=((W[t-15]>>>7)|(W[t-15]<<25))^((W[t-15]>>>18)|(W[t-15]<<14))^(W[t-15]>>>3);const s1=((W[t-2]>>>17)|(W[t-2]<<15))^((W[t-2]>>>19)|(W[t-2]<<13))^(W[t-2]>>>10);W[t]=(W[t-16]+s0+W[t-7]+s1)>>>0}
      let[a,b,c,d,e,f,g,h]=H;
      for(let t=0;t<64;t++){
        const S1=((e>>>6)|(e<<26))^((e>>>11)|(e<<21))^((e>>>25)|(e<<7));const ch=(e&f)^(~e&g);
        const T1=(h+S1+ch+K[t]+W[t])>>>0;const S0=((a>>>2)|(a<<30))^((a>>>13)|(a<<19))^((a>>>22)|(a<<10));
        const maj=(a&b)^(a&c)^(b&c);const T2=(S0+maj)>>>0;h=g;g=f;f=e;e=(d+T1)>>>0;d=c;c=b;b=a;a=(T1+T2)>>>0}
      H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;
      H[4]=(H[4]+e)>>>0;H[5]=(H[5]+f)>>>0;H[6]=(H[6]+g)>>>0;H[7]=(H[7]+h)>>>0}
    const out=new Uint8Array(32);
    for(let i=0;i<8;i++){out[i*4]=H[i]>>>24;out[i*4+1]=(H[i]>>>16)&0xff;out[i*4+2]=(H[i]>>>8)&0xff;out[i*4+3]=H[i]&0xff}
    return out}
  function b64(buf){let s='';for(let i=0;i<buf.length;i++)s+=String.fromCharCode(buf[i]);return btoa(s)}
  return{sha256base64:(m)=>b64(sha256(m))}})();

// ═══════════════════════════════════════
// 拉流地址自动推断引擎
// ═══════════════════════════════════════
function inferPullUrl(pushUrl, platform) {
  if (!pushUrl || pushUrl === '--') return [];
  // 提取查询参数（保留在 URL 中）
  const qm = pushUrl.indexOf('?');
  const queryPart = qm >= 0 ? pushUrl.substring(qm) : '';
  let base = pushUrl.replace(/[?#].*$/, '');
  // 去掉末尾的 ...
  base = base.replace(/\.{2,}$/, '');
  // 去掉尾部 key 分隔符 /
  base = base.replace(/\/+$/, '');
  const candidates = [];
  // 解析推流地址
  let scheme = 'rtmp', domain = '', path = '';
  const m = base.match(/^(rtmp[s]?|srt):\/\/([^/]+)(\/.*)?$/);
  if (m) {
    scheme = m[1]; domain = m[2]; path = (m[3] || '');
  } else { return []; }

  const parts = path.replace(/^\//, '').split('/').filter(Boolean);
  const streamKey = parts.length > 0 ? parts[parts.length - 1] : 'stream';
  const app = parts.length > 1 ? parts.slice(0, -1).join('/') : 'live';

  // ═══ 即构ZEGO：固定拉流域名 + 应用名 + 流名.flv ═══
  if (platform === '即构ZEGO' || domain.includes('inzego.com') || domain.includes('zego')) {
    const pullDomain = 'play-hw.live-zego.lizhiweike.com';
    const pullApp = 'lizhiweike';
    // 只返回 FLV 地址，浏览器直接播放
    candidates.push(`https://${pullDomain}/${pullApp}/${streamKey}.flv`);
  } else if (platform === '阿里云直播') {
    // 阿里云: rtmp://{push_domain}/live/{streamKey} → https://{pull_domain}/live/{streamKey}.m3u8
    // 推流域名可能有 push / push- 前缀
    const pullDomain = domain.replace(/^push[.-]?/, '').replace(/^push/, 'live');
    candidates.push(`https://${pullDomain}/${app}/${streamKey}.m3u8`);
    candidates.push(`https://${pullDomain}/${app}/${streamKey}.flv`);
    candidates.push(`https://${domain}/${app}/${streamKey}.m3u8`);
  } else if (platform === '腾讯云直播') {
    const pullDomain = domain.replace(/^push[.-]?/, 'live').replace(/^push/, 'live');
    candidates.push(`https://${pullDomain}/${app}/${streamKey}.m3u8`);
    candidates.push(`https://${pullDomain}/${app}/${streamKey}.flv`);
    candidates.push(`https://${domain}/${app}/${streamKey}.m3u8`);
  } else if (platform === 'B站') {
    // B站推流 rtmp://live-push.bilivideo.com/live-bvc/?streamname=xxx&key=yyy
    // B站拉流通常由B站分配，推流地址无法直接推断
    candidates.push(`https://live-pull.bilivideo.com/${app}/${streamKey}.flv`);
    candidates.push(`https://live-pull.bilivideo.com/${app}/${streamKey}.m3u8`);
  } else {
    // ═══ 通用规则 ═══
    // 1. 同域名，HLS 后缀
    candidates.push(`https://${domain}/${app}/${streamKey}/index.m3u8`);
    candidates.push(`https://${domain}/${app}/${streamKey}.m3u8`);
    // 2. 同域名，FLV 后缀
    candidates.push(`https://${domain}/${app}/${streamKey}.flv`);
    // 3. 尝试 l-rtmp → l-hls 域名替换
    if (domain.includes('l-rtmp') || domain.includes('rtmp')) {
      const alt = domain.replace('l-rtmp', 'l-hls').replace('rtmp', 'hls');
      if (alt !== domain) {
        candidates.push(`https://${alt}/${app}/${streamKey}/index.m3u8`);
        candidates.push(`https://${alt}/${app}/${streamKey}.m3u8`);
      }
    }
    // 4. 尝试 rtsp 直播
    candidates.push(`rtsp://${domain}/${path}`);
  }
  return candidates;
}

// 用 OBS 的 pushUrl 生成最终拉流地址（更新到 state）
function resolvePullUrl(room, state) {
  // 1. 用户手动填写优先
  if (room.pullUrl && room.pullUrl.trim()) return { url: room.pullUrl.trim(), source: 'manual' };
  // 2. 从 state.pushUrl 推断
  if (!state.pushUrl || state.pushUrl === '--') return { url: null, source: 'none' };
  // 3. 生成候选（每次推断取第一个候选）
  const candidates = inferPullUrl(state.pushUrl, room.platform);
  if (candidates.length > 0) {
    // 检查是否已有缓存的可用 URL
    if (state.workingPullUrl) return { url: state.workingPullUrl, source: state.pullSource || 'inferred' };
    return { url: candidates[0], source: 'inferred', candidates };
  }
  return { url: null, source: 'none' };
}

// ═══════════════════════════════════════
// 编码器名称美化
// ═══════════════════════════════════════
function prettyEncoder(raw) {
  if (!raw) return '--';
  const map = {
    'obs_x264': 'H.264 (x264)',
    'obs_qsv11': 'H.264 (QSV)',
    'obs_qsv11_av1': 'AV1 (QSV)',
    'obs_qsv11_hevc': 'H.265/HEVC (QSV)',
    'ffmpeg_nvenc': 'H.264 (NVENC)',
    'nvenc_h264': 'H.264 (NVENC)',
    'nvenc_hevc': 'H.265/HEVC (NVENC)',
    'obs_amf_h264': 'H.264 (AMF)',
    'obs_amf_hevc': 'H.265/HEVC (AMF)',
    'obs_amf_av1': 'AV1 (AMF)',
    'obs_output_ffmpeg_mpegts_muxer': 'MPEG-TS',
    'simple_h264_stream': 'H.264 (Simple)',
    'simple_h265_stream': 'H.265 (Simple)',
    'obs_apple_h264': 'H.264 (Apple VT)',
    'obs_apple_hevc': 'H.265 (Apple VT)',
    'obs_apple_prores': 'ProRes (Apple)',
    'obs_apple_h264_encoder2': 'H.264 (VT)',
    'obs_apple_prores422': 'ProRes 422',
    'obs_streaming_server': 'OBS Stream Server',
    'ffmpeg_aac': 'AAC (FFmpeg)',
    'CoreAudio_AAC': 'AAC (CoreAudio)',
    'obs_ffmpeg_aac': 'AAC',
    'ffmpeg_opus': 'Opus',
    'ffmpeg_mp3': 'MP3',
    'obs_ffmpeg_flac': 'FLAC',
  };
  // 精确匹配
  if (map[raw]) return map[raw];
  // 模糊匹配
  for (const [k, v] of Object.entries(map)) {
    if (raw.includes(k.replace('obs_', ''))) return v;
  }
  // 返回原文去除 obs_ 前缀
  return raw.replace(/^obs_/, '').replace(/_/g, ' ');
}

function prettyRateControl(v) {
  if (v === undefined || v === null || v === '') return '--';
  // NVENC / QSV / AMF 可能返回数值 0=CBR 1=VBR 2=CQP 3=lossless
  // GetProfileParameter 返回字符串 "0"，GetOutputSettings 返回数字 0
  var numericMap = { '0': 'CBR', '1': 'VBR', '2': 'CQP', '3': 'lossless', 0: 'CBR', 1: 'VBR', 2: 'CQP', 3: 'lossless' };
  var m = { CBR: '恒定比特率 (CBR)', VBR: '可变比特率 (VBR)', CQP: '恒定质量 (CQP)', lossless: '无损', ICQ: '智能质量 (ICQ)', LA_CBR: '前瞻恒定 (LA_CBR)', LA_VBR: '前瞻可变 (LA_VBR)' };
  var key = numericMap[v] || v;
  var result = m[key] || String(key);
  if (typeof _diag !== 'undefined') _diag('prettyRateCtrl', 'in=' + JSON.stringify(v) + ' (type=' + (typeof v) + ') key=' + key + ' → "' + result + '"');
  return result;
}
function prettyPreset(v, encType) {
  // NVENC: P1-P7
  if (encType === 'nvenc') {
    const labels = { p1:'最慢(最高质量)', p2:'较慢', p3:'快速(较低质量)', p4:'更快', p5:'慢速(较高质量)', p6:'最快(最低质量)', p7:'最快(最低质量)' };
    var k = (v || '').toLowerCase();
    return labels[k] ? v.toUpperCase() + ': ' + labels[k] : (v || '--');
  }
  // x264: speed presets
  const x264Labels = { ultrafast:'极速', superfast:'超快', veryfast:'很快', faster:'较快', fast:'快', medium:'中等', slow:'慢', slower:'较慢', veryslow:'很慢', placebo:'极慢' };
  return x264Labels[v] ? v + ' (' + x264Labels[v] + ')' : (v || '--');
}
function prettyTune(v) {
  const nvenc = { hq: '高质量', ll: '低延迟', ull: '超低延迟', lossless: '无损质量', psy: '心理视觉' };
  if (nvenc[v]) return nvenc[v];
  // x264 tunes
  const x264 = { film:'电影', animation:'动画', grain:'颗粒', stillimage:'静态图', psnr:'PSNR', ssim:'SSIM', fastdecode:'快速解码', zerolatency:'零延迟' };
  return x264[v] || v || '--';
}

function encoderFamily(encoderId) {
  if (!encoderId || encoderId === '--') return 'unknown';
  if (encoderId.includes('nvenc_hevc') || encoderId.includes('nvenc_h265')) return 'nvenc_hevc';
  if (encoderId.includes('nvenc')) return 'nvenc';
  if (encoderId.includes('x264')) return 'x264';
  if (encoderId.includes('qsv')) return 'qsv';
  if (encoderId.includes('amf')) return 'amf';
  if (encoderId.includes('apple')) return 'apple';
  return 'other';
}

// ═══════════════════════════════════════
// 编码器参数模板 — 每个编码器对应一组参数定义
// ═══════════════════════════════════════
const ENCODER_PARAMS = {
  'x264': [
    { key: 'rateControl', label: '比特率控制', icon: '🎚' },
    { key: 'preset', label: 'CPU使用预设', icon: '⚡' },
    { key: 'tune', label: '微调', icon: '🎯' },
    { key: 'encoderProfile', label: '配置', icon: '📋' },
    { key: 'gop', label: '关键帧间隔', icon: '⏱' },
    { key: 'bFrames', label: 'B帧', icon: '🖼' },
  ],
  'nvenc': [
    { key: 'rateControl', label: '比特率控制', icon: '🎚' },
    { key: 'preset', label: '编码预设', icon: '⚡' },
    { key: 'tune', label: '编码调节', icon: '🎯' },

const STORAGE_KEY = 'obs_dashboard_rooms';

class RoomManager {
  constructor() {
    this.rooms = this.load();
    this.nextId = this.rooms.length > 0 ? Math.max(...this.rooms.map(r => r.id)) + 1 : 1;
    this.connections = new Map();
    this.states = new Map();
  }
  load() { try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : []; } catch (e) { return []; } }
  save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.rooms)); }
  add(room) { room.id = this.nextId++; this.rooms.push(room); this.save(); return room; }
  update(id, data) { const i = this.rooms.findIndex(r => r.id === id); if (i < 0) return null; Object.assign(this.rooms[i], data); this.save(); return this.rooms[i]; }
  remove(id) { this.disconnect(id); this.rooms = this.rooms.filter(r => r.id !== id); this.save(); }
  get(id) { return this.rooms.find(r => r.id === id); }
  connect(room) {
    const c = new OBSConnection(room, (s) => {
      s._room = room; this.states.set(room.id, s); updateAllCards(); updateSummary();
    });
    this.connections.set(room.id, c); c.connect();
  }
  disconnect(id) { const c = this.connections.get(id); if (c) { c.destroy(); this.connections.delete(id); } this.states.delete(id); }
  connectAll() { for (const r of this.rooms) this.connect(r); renderAll(); updateSummary(); }
  getState(id) { return this.states.get(id) || { _room: this.get(id), status: 'offline', streaming: false, alerts: [] }; }
  selectAudioInput(id, inputName) {
    var numId = Number(id);
    var s = this.states.get(numId); if (!s) { console.warn('[selectAudioInput] state not found for id:', numId); return; }
    s.selectedAudioInput = inputName;
    s.micName = inputName;
    s.micLevelPeak = 0;
    s.micLevelDbPeak = -100;
    // 关键：同步到 OBSConnection 内部 state，防止 _emit() 浅拷贝覆盖
    var conn = this.connections.get(numId);
    if (conn && conn.state) {
      conn.state.selectedAudioInput = inputName;
      conn.state.micName = inputName;
      console.log('[selectAudioInput] id=' + numId + ' → "' + inputName + '" (state + conn.state 双写)');
    } else {
      console.warn('[selectAudioInput] conn not found for id:', numId);
    }
    updateAllCards();
  }
}

class OBSConnection {
  constructor(room, onChange) {
    this.room = room; this.onChange = onChange; this.ws = null; this.identified = false;
    this.reconnectAttempts = 0; this.reconnectTimer = null; this.pollTimer = null;
    this.requestId = 0; this.pendingRequests = new Map(); this.state = this._initState();
    this._outputs = []; // OBS v5 output list cache
    this._audioInputs = []; // OBS audio input names cache
    this._profMap = {}; // OBS v5 GetProfileParameter requestId → {parameterCategory, parameterName} map
    // 时序计算用
    this._lb = undefined; this._lt = undefined;
  }
  _initState() {
    return {
      status: 'connecting', streaming: false, streamTime: 0,
      // 视频
      resolution: '--', fps: '--', fpsSet: null, bitrate: '--',
      videoEncoder: '--', gop: '--', avgRenderTime: '--',
      rateControl: '--', preset: '--', tune: '--', encoderProfile: '--', bFrames: '--',
      _rawPresetNvenc: null, _rawPresetX264: null, _rawEncoderId: null, // 原始编码预设值 + 原始编码器ID
      cpu: '--', memory: '--', disk: '--',
      // 录制 / 虚拟摄像机
      recording: false, recordingTime: 0, virtualCam: false,
      // 麦克风
      micName: '--', micVolumeDb: '--', micMuted: false, micLevelPeak: 0, micLevelDbPeak: -100,
      audioInputs: [], selectedAudioInput: '--',
      // 网络
      droppedFrames: 0, outputTotalFrames: 0, dropRate: '--',
      renderSkippedFrames: 0, renderTotalFrames: 0, renderDropRate: '--',
      networkQuality: '--',
      // 音频
      audioEncoder: '--', audioBitrate: '--', audioSampleRate: '--', audioChannels: '--',
      // 场景
      scene: '--',
      // 地址
      pushUrl: '--', pullUrl: '--', workingPullUrl: null, pullSource: 'none', pullCandidates: [],
      alerts: []
    };
  }
  connect() {
    if (this.ws) { try { this.ws.close(); } catch (e) {} }
    const url = 'ws://' + this.room.host + ':' + this.room.port;
    console.log('[OBS] Connect', url, this.room.name);
    try {
      this.ws = new WebSocket(url); this.ws.binaryType = 'arraybuffer';
      this.ws.onopen = () => {};
      this.ws.onmessage = (e) => this._onMsg(e);
      this.ws.onclose = (e) => this._onClose(e);
      this.ws.onerror = (e) => console.log('[OBS] Error', this.room.name);
    } catch (e) { this._scheduleReconnect(); }
  }
  _onMsg(e) {
    try {
      const m = JSON.parse(typeof e.data === 'string' ? e.data : new TextDecoder().decode(e.data));
      switch (m.op) { case 0: this._onHello(m.d); break; case 2: this._onIdentified(m.d); break; case 5: this._onEvent(m.d); break; case 7: this._onResponse(m.d); break; case 9: this._onBatchResp(m.d); break; }
    } catch (e) {}
  }
  _onHello(d) {
    const a = d.authentication;
    const go = (as) => { const id = { op: 1, d: { rpcVersion: 1, eventSubscriptions: 1048575 } }; if (as) id.d.authentication = as; this._send(id); };
    if (a && this.room.password) { const s = OBSAuth.sha256base64(this.room.password + a.salt); go(OBSAuth.sha256base64(s + a.challenge)); }
    else { go(''); }
  }
  _onIdentified(d) {
    console.log('[OBS] Identified', this.room.name);
    this.identified = true; this.reconnectAttempts = 0;
    this.state.status = 'connected'; this._emit(); this._startPoll();
  }
  _onEvent(d) {
    // DEBUG: log event types (first 10 of each type)
    this._evtCount = this._evtCount || {};
    this._evtCount[d.eventType] = (this._evtCount[d.eventType] || 0) + 1;
    if (this._evtCount[d.eventType] <= 2 || (this._evtCount[d.eventType] % 50 === 0)) {
      console.log('[OBS EVENT]', this.room.name, d.eventType, '#' + this._evtCount[d.eventType],
        d.eventType === 'InputVolumeMeters' ? '(inputs=' + ((d.eventData && d.eventData.inputs) ? d.eventData.inputs.length : 0) + ')' : '');
    }
    if (d.eventType === 'StreamStateChanged') {
      this.state.streaming = d.eventData.outputActive; this.state.streamTime = d.eventData.outputDuration || 0; this._emit();
    }
    if (d.eventType === 'RecordStateChanged') {
      this.state.recording = d.eventData.outputActive; this.state.recordingTime = d.eventData.outputDuration || 0; this._emit();
    }
    if (d.eventType === 'VirtualcamStateChanged') {
      this.state.virtualCam = d.eventData.outputActive; this._emit();
    }
    if (d.eventType === 'InputVolumeMeters') {
      this._lastObsMeterTs = Date.now();
      var inputs = d.eventData.inputs || [];
      var target = this.state.selectedAudioInput || this.state.micName;
      // 诊断：首批事件打印可用输入
      if (inputs.length > 0 && this._evtCount['InputVolumeMeters'] <= 3) {
        console.log('[OBS METER] 可用输入:', inputs.map(function(inp){return inp.inputName;}).join(', '), '| 当前选中:', target);
      }
      for (var mi = 0; mi < inputs.length; mi++) {
        if (inputs[mi].inputName !== target) continue;
        var levels = inputs[mi].inputLevelsMul || [];
        var peakMul = 0;
        if (levels.length > 0) {
          if (typeof levels[0] === 'number') {
            for (var c = 0; c < levels.length; c++) { if (levels[c] > peakMul) peakMul = levels[c]; }
          } else {
            for (var c = 0; c < levels.length; c++) {
              var ch = levels[c] || [];
              for (var s = 0; s < ch.length; s++) { if (ch[s] > peakMul) peakMul = ch[s]; }
            }
          }
        }
        this.state.micLevelPeak = peakMul;
        var dbs = inputs[mi].inputLevelsDb || [];
        var peakDb = -100;
        if (dbs.length > 0) {
          if (typeof dbs[0] === 'number') {
            for (var c2 = 0; c2 < dbs.length; c2++) { if (dbs[c2] > peakDb) peakDb = dbs[c2]; }
          } else {
            for (var c2 = 0; c2 < dbs.length; c2++) {
              var ch2 = dbs[c2] || [];
              for (var s2 = 0; s2 < ch2.length; s2++) { if (ch2[s2] > peakDb) peakDb = ch2[s2]; }
            }
          }
        }
        this.state.micLevelDbPeak = peakDb;
        this.state.micName = target;
        this._updateMicMeter();
        return; // 匹配到就退出
      }
      // 没匹配到选中设备，清零
      this.state.micLevelPeak = 0; this.state.micLevelDbPeak = -100; this._updateMicMeter();
    }
    if (d.eventType === 'SceneChanged') { this.state.scene = d.eventData.sceneName || '--'; this._emit(); }
  }
  _onResponse(d) { const cb = this.pendingRequests.get(d.requestId); if (cb) { cb(d); this.pendingRequests.delete(d.requestId); } }
  _onBatchResp(d) {
    const cb = this.pendingRequests.get(d.requestId); if (cb) { cb(d); this.pendingRequests.delete(d.requestId); }
    if (d.results) { for (const r of d.results) { const cb2 = this.pendingRequests.get(r.requestId); if (cb2) cb2(r); this.pendingRequests.delete(r.requestId); } }
  }
  _onClose(e) {
    console.log('[OBS] Closed', this.room.name, 'code:', e ? e.code : 0);
    this.identified = false; this.ws = null; this._stopPoll();
    this.state.status = 'offline'; this.state.streaming = false;
    this.state.recording = false; this.state.virtualCam = false;
    this.state.micName = '--'; this.state.micVolumeDb = '--'; this.state.micMuted = false; this.state.micLevelPeak = 0; this.state.micLevelDbPeak = -100;
    this.state.audioInputs = []; this.state.selectedAudioInput = '--';
    this._emit(); this._scheduleReconnect();
  }
  _scheduleReconnect() {
    const d = Math.min(2000 * Math.pow(2, this.reconnectAttempts), 30000); this.reconnectAttempts++;
    this.state.status = 'reconnecting'; this._emit();
    this.reconnectTimer = setTimeout(() => this.connect(), d);
  }
  _startPoll() { this._stopPoll(); this._poll(); this.pollTimer = setInterval(() => this._poll(), 2000); }
  _stopPoll() { if (this.pollTimer) { clearInterval(this.pollTimer); this.pollTimer = null; } }
  async _poll() {
    if (!this.identified || !this.ws || this.ws.readyState !== WebSocket.OPEN) return;
    var self = this;
    // 重置原始编码预设值（每轮重新采集）
    this.state._rawPresetNvenc = null;
    this.state._rawPresetX264 = null;
    var bid = 'b' + this.room.id + '_' + (++this.requestId);
    var requests = [
      { requestId: bid + '_1', requestType: 'GetStreamStatus' },
      { requestId: bid + '_2', requestType: 'GetStats' },
      { requestId: bid + '_3', requestType: 'GetVideoSettings' },
      { requestId: bid + '_4', requestType: 'GetSceneList' },
      { requestId: bid + '_5', requestType: 'GetStreamServiceSettings' },
      { requestId: bid + '_5r', requestType: 'GetRecordStatus' },
      { requestId: bid + '_5v', requestType: 'GetVirtualCamStatus' },
      { requestId: bid + '_5i', requestType: 'GetInputList' },
      { requestId: bid + '_6', requestType: 'GetOutputList' },
      // Advanced 模式：从 Profile 读取编码器参数
      { requestId: bid + '_7', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'Encoder' } },
      { requestId: bid + '_8', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'Track1Bitrate' } },
      // 采样率：从 Audio 类别读取
      { requestId: bid + '_9', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'Audio', parameterName: 'SampleRate' } },
      // 编码器细粒度参数 — Advanced 模式存在 StreamEncoder 类别下（AdvOut 类别仅存 Encoder/bitrate）
      // NVENC: rate_control, preset, tune, profile, bf
      // x264:  rate_control, cpu_usage, tune, profile
      // 先查 AdvOut（兼容 Simple 模式），再查 StreamEncoder（Advanced 模式）
      { requestId: bid + '_10', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'rate_control' } },
      { requestId: bid + '_11', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'preset' } },
      { requestId: bid + '_12', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'cpu_usage' } },
      { requestId: bid + '_13', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'tune' } },
      { requestId: bid + '_14', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'profile' } },
      { requestId: bid + '_15', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'AdvOut', parameterName: 'bf' } },
      // StreamEncoder 类别（Advanced 模式编码器参数实际存储位置）
      // cpu_usage 在前，preset 在后 — NVENC preset 覆盖可能残留的 x264 cpu_usage 值
      { requestId: bid + '_16', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'rate_control' } },
      { requestId: bid + '_17', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'cpu_usage' } },
      { requestId: bid + '_18', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'preset' } },
      { requestId: bid + '_19', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'tune' } },
      { requestId: bid + '_20', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'profile' } },
      { requestId: bid + '_21', requestType: 'GetProfileParameter', requestData: { parameterCategory: 'StreamEncoder', parameterName: 'bf' } }
    ];
    // 存储 profile 参数名映射（response 里没有 requestData）
    if (!this._profMap) this._profMap = {};
    for (var pi = 6; pi < requests.length; pi++) {
      if (requests[pi].requestType === 'GetProfileParameter') {
        this._profMap[requests[pi].requestId] = requests[pi].requestData;
      }
    }
    var batch = { op: 8, d: { requestId: bid, haltOnFailure: false, requests: requests } };
    var p = new Promise(function(rv) {
      var t = setTimeout(function() { rv(null); }, 3000);
      self.pendingRequests.set(bid, function(d) { clearTimeout(t); rv(d); });
      for (var i = 0; i < batch.d.requests.length; i++) {
        self.pendingRequests.set(batch.d.requests[i].requestId, function() {});
      }
    });
    try { this._send(batch); } catch (e) { return; }
    var result = await p; if (!result) return; if (!result.results) return;
    for (var j = 0; j < result.results.length; j++) this._parse(result.results[j]);

    // Phase 2: query output settings for each discovered output (encoder / GOP / audio params)
    // Also ensure we query adv_stream (Advanced mode streaming output) even if not in list
    var outputs = this._outputs || [];
    var seenNames = {};
    if (outputs.length > 0) {
      var bid2 = 'b' + this.room.id + '_o' + '_' + (++this.requestId);
      var outReqs = [];
      for (var k = 0; k < outputs.length; k++) {
        var raw = outputs[k];
        var oname = (typeof raw === 'string') ? raw : (raw.outputName || raw.name || '');
        if (oname && !seenNames[oname]) {
          seenNames[oname] = true;
          outReqs.push({ requestId: bid2 + '_' + k, requestType: 'GetOutputSettings', requestData: { outputName: oname } });
        }
      }
      // 确保 adv_stream 也在查询列表中（Advanced 模式推流输出）
      if (!seenNames['adv_stream']) {
        outReqs.push({ requestId: bid2 + '_adv', requestType: 'GetOutputSettings', requestData: { outputName: 'adv_stream' } });
      }
      // advanced_video_stream 是编码器配置 section 名，不是 output 名，已移除
      var batch2 = { op: 8, d: { requestId: bid2, haltOnFailure: false, requests: outReqs } };
      var p2 = new Promise(function(rv2) {
        var t2 = setTimeout(function() { rv2(null); }, 3000);
        self.pendingRequests.set(bid2, function(d) { clearTimeout(t2); rv2(d); });
        for (var m = 0; m < batch2.d.requests.length; m++) {
          self.pendingRequests.set(batch2.d.requests[m].requestId, function() {});
        }
      });
      try { this._send(batch2); } catch(e) {}
      var result2 = await p2;
      if (result2 && result2.results) {
        for (var n = 0; n < result2.results.length; n++) this._parse(result2.results[n]);
      }
    }

    // Phase 2.5: 查询选中音频输入音量（兜底数据源）
    var selAudio = this.state.selectedAudioInput;
    if (selAudio && selAudio !== '--') {
      var bid25 = 'b' + this.room.id + '_a_' + (++this.requestId);
      var aReqs = [{ requestId: bid25, requestType: 'GetInputVolume', requestData: { inputName: selAudio }, _pollMic: true }];
      var batch25 = { op: 8, d: { requestId: bid25, haltOnFailure: false, requests: aReqs } };
      var p25 = new Promise(function(rv25) {
        var t25 = setTimeout(function() { rv25(null); }, 3000);
        self.pendingRequests.set(bid25, function(d) { clearTimeout(t25); rv25(d); });
        self.pendingRequests.set(bid25, function() {});
      });
      try { this._send(batch25); } catch(e) {}
      var result25 = await p25;
      if (result25 && result25.results) {
        for (var an = 0; an < result25.results.length; an++) this._parse(result25.results[an]);
      }
    }

    // Phase 3: 用编码器原始 ID 作为 parameterCategory 查询编码器内部参数
    // OBS 在 basic.ini 中以编码器 ID 为 section 名存储参数（如 [ffmpeg_nvenc]、[obs_x264]）
    // 但部分 OBS 版本（特别是 obs-nvenc）使用 dedicated section 名如 advanced_video_stream
    var rawEncId = this.state._rawEncoderId;
    if (typeof _diag !== 'undefined') _diag('rateCtrl-P3-start', 'rawEncId=' + (rawEncId||'null') + ' encFam=' + (rawEncId && rawEncId !== '--' ? encoderFamily(rawEncId) : 'N/A'));
    if (rawEncId && rawEncId !== '--') {
      var encFam = encoderFamily(rawEncId);
      var encParamNames = [];
      // 根据编码器类型，准备要查询的参数名
      if (encFam === 'nvenc' || encFam === 'nvenc_hevc' || encFam === 'qsv' || encFam === 'amf') {
        encParamNames = ['rate_control', 'preset', 'tune', 'bf', 'profile', 'bitrate'];
      } else if (encFam === 'x264') {
        encParamNames = ['rate_control', 'cpu_usage', 'tune', 'profile', 'bitrate', 'bf'];
      } else {
        encParamNames = ['rate_control', 'bitrate', 'preset'];
      }
      var bid3 = 'b' + this.room.id + '_enc_' + (++this.requestId);
      var encReqs = [];
      // 尝试多个可能的 category 名（OBS 不同版本/配置用不同的 section 名）
      var catCandidates = [rawEncId];
      // Advanced 输出模式的 NVENC 可能用 advanced_video_stream
      if (encFam === 'nvenc' || encFam === 'nvenc_hevc') {
        catCandidates.push('advanced_video_stream');
      }
      // x264 编码器可能用 obs_x264
      if (encFam === 'x264' && rawEncId !== 'obs_x264') {
        catCandidates.push('obs_x264');
      }
      if (typeof _diag !== 'undefined') _diag('rateCtrl-P3-cats', 'catCandidates=[' + catCandidates.join(',') + '] params=[' + encParamNames.join(',') + ']');
      for (var ci = 0; ci < catCandidates.length; ci++) {
        for (var ei = 0; ei < encParamNames.length; ei++) {
          encReqs.push({
            requestId: bid3 + '_c' + ci + '_' + ei,
            requestType: 'GetProfileParameter',
            requestData: { parameterCategory: catCandidates[ci], parameterName: encParamNames[ei] }
          });
        }
      }
      if (encReqs.length > 0) {
        // 注册 _profMap
        for (var epi = 0; epi < encReqs.length; epi++) {
          self._profMap[encReqs[epi].requestId] = encReqs[epi].requestData;
        }
        var batch3 = { op: 8, d: { requestId: bid3, haltOnFailure: false, requests: encReqs } };
        var p3 = new Promise(function(rv3) {
          var t3 = setTimeout(function() { rv3(null); }, 3000);
          self.pendingRequests.set(bid3, function(d) { clearTimeout(t3); rv3(d); });
          for (var eq = 0; eq < batch3.d.requests.length; eq++) {
            self.pendingRequests.set(batch3.d.requests[eq].requestId, function() {});
          }
        });
        try { this._send(batch3); } catch(e) {}
        var result3 = await p3;
        if (result3 && result3.results) {
          if (typeof _diag !== 'undefined') _diag('rateCtrl-P3-results', 'got ' + result3.results.length + ' results');

function exportConfig() {
  var data = {
    version: 2,
    exportedAt: new Date().toISOString(),
    rooms: roomManager.rooms,
    hierarchy: _hier
  };
  // Electron 模式：使用原生保存对话框
  if (window.electronAPI && window.electronAPI.exportConfig) {
    window.electronAPI.exportConfig(JSON.stringify(data, null, 2));
    return;
  }
  // 浏览器模式：Blob 下载
  var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'obs-config.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importConfig(event) {
  // Electron 模式：使用原生打开对话框
  if (window.electronAPI && window.electronAPI.importConfig) {
    importConfigElectron();
    return;
  }
  // 浏览器模式：触发文件选择
  if (!event || !event.target || !event.target.files) {
    document.getElementById('importFileInput').click();
    return;
  }
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) { processImportData(e.target.result); };
  reader.readAsText(file);
}

async function importConfigElectron() {
  try {
    var result = await window.electronAPI.importConfig();
    if (result.success) {
      processImportData(result.content);
    }
  } catch (err) {
    alert('导入失败: ' + err.message);
  }
}

function processImportData(jsonStr) {
  try {
    var data = JSON.parse(jsonStr);
    if (!data.rooms || !Array.isArray(data.rooms)) {
      alert('配置文件格式错误：缺少 rooms 数组');
      return;
    }
    // 合并策略：保留本地已有的房间（同名跳过），新增导入的房间
    var existingNames = {};
    roomManager.rooms.forEach(function(r) { existingNames[r.name] = true; });
    var imported = 0, skipped = 0;
    data.rooms.forEach(function(r) {
      if (existingNames[r.name]) { skipped++; return; }
      // 重置 ID，让 RoomManager 自动分配
      delete r.id;
      roomManager.add(r);
      imported++;
    });
    // 导入层级结构（直接覆盖，层级数据通常需要完整迁移）
    if (data.hierarchy && data.hierarchy.locations) {
      _hier = data.hierarchy;
      saveHierarchy();
    }
    // 保存房间
    roomManager.save();
    alert('导入完成！\n新增房间: ' + imported + ' 间\n跳过(同名): ' + skipped + ' 间\n层级结构已更新。\n页面将刷新以应用更改。');
    location.reload();
  } catch (err) {
    alert('配置文件解析失败: ' + err.message);
  }
}

// 从 _hier 收集所有地点/办公区/楼层 名称用于 datalist
function getAllLocNames() { return (_hier.locations || []).map(l => l.name).filter(Boolean); }
function getAllOfficeNames() {
  var o = [];
  (_hier.locations || []).forEach(function(l) {
    (l.officeAreas || []).forEach(function(a) { if (a.name) o.push(a.name); });
  });
  return o;
}
function getAllFloorNames() {
  var f = [];
  (_hier.locations || []).forEach(function(l) {
    (l.officeAreas || []).forEach(function(a) {
      (a.floors || []).forEach(function(x) { if (x.name) f.push(x.name); });
    });
  });
  return f;
}

// 验证房间层级是否在已注册层级中
function validateRoomHierarchy(loc, office, floor) {
  if (!loc && !office && !floor) return true; // 全部为空，允许
  var flat = [];
  (_hier.locations || []).forEach(function(l) {
    (l.officeAreas || []).forEach(function(a) {
      (a.floors || []).forEach(function(f) {
        flat.push({loc: l.name, office: a.name, floor: f.name});
      });
    });
  });
  return flat.some(function(x) { return x.loc === loc && x.office === office && x.floor === floor; });
}

// ═══ 侧边栏树形导航 ═══
function treeSelect(type, locId, locName, oaId, oaName, flId, flName) {
  _treeFilter = {type:type, locId:locId||null, locName:locName||null, oaId:oaId||null, oaName:oaName||null, flId:flId||null, flName:flName||null};
  renderSideTree(); renderAll();
  // 更新顶部标题
  var mt = document.getElementById('mainTitle');
  var ms = document.getElementById('mainSub');
  if (type === 'all') { mt.textContent = '\uD83C\uDF10 \u5168\u90E8\u76F4\u64AD\u95F4'; ms.textContent = ''; }
  else if (type === 'loc') { mt.textContent = '\uD83D\uDCCD ' + (locName||''); ms.textContent = ''; }
  else if (type === 'oa') { mt.textContent = '\uD83C\uDFE2 ' + (oaName||''); ms.textContent = '\uD83D\uDCCD ' + (locName||''); }
  else if (type === 'floor') { mt.textContent = '\uD83D\uDCCB ' + (flName||''); ms.textContent = '\uD83D\uDCCD ' + (locName||'') + ' \u203A \uD83C\uDFE2 ' + (oaName||''); }
}

function treeToggleGroup(groupId) {
  if (_treeCollapsed.has(groupId)) _treeCollapsed.delete(groupId);
  else _treeCollapsed.add(groupId);
  renderSideTree();
}

function navigateToRoom(locName, oaName, flName) {
  var loc = (_hier.locations || []).find(function(l) { return l.name === locName; });
  if (!loc) return;
  var oa = loc && oaName ? (loc.officeAreas || []).find(function(a) { return a.name === oaName; }) : null;
  var fl = oa && flName ? (oa.floors || []).find(function(f) { return f.name === flName; }) : null;
  if (fl) {
    // 自动展开路径
    _treeCollapsed.delete('loc-' + loc.id);
    _treeCollapsed.delete('oa-' + (oa?oa.id:''));
    treeSelect('floor', loc.id, loc.name, oa.id, oa.name, fl.id, fl.name);
  } else if (oa) {
    _treeCollapsed.delete('loc-' + loc.id);
    _treeCollapsed.delete('oa-' + oa.id);
    treeSelect('oa', loc.id, loc.name, oa.id, oa.name);
  } else if (loc) {
    _treeCollapsed.delete('loc-' + loc.id);
    treeSelect('loc', loc.id, loc.name);
  }
}

// ═══ 渲染侧边栏树 ═══
function renderSideTree() {
  var el = document.getElementById('sideTree');
  if (!el) return;
  var h = '';
  // 全部直播间
  var isAll = _treeFilter.type === 'all';
  h += '<div class="tree-root">';
  h += '<div class="tr-item' + (isAll ? ' active' : '') + '" onclick="treeSelect(\'all\')"><span class="tr-icon">\uD83C\uDF10</span><span class="tr-name">\u5168\u90E8\u76F4\u64AD\u95F4</span></div>';
  h += '</div>';

  (_hier.locations || []).forEach(function(loc) {
    var isLocActive = _treeFilter.type === 'loc' && _treeFilter.locId === loc.id;
    var isLocPath = _treeFilter.locId === loc.id;
    var locCollapsed = _treeCollapsed.has('loc-' + loc.id);
    var hasOA = (loc.officeAreas || []).length > 0;
    // 统计该地点下的总房间数
    var locCount = countRoomsInLoc(loc.name);

    h += '<div class="tree-root">';
    h += '<div class="tr-item' + (isLocActive ? ' active' : '') + '" onclick="treeSelect(\'loc\',\'' + loc.id + '\',\'' + e(loc.name) + '\')"><span class="tr-icon">\uD83D\uDCCD</span><span class="tr-name">' + e(loc.name) + '</span>' + (locCount>0 ? '<span class="tr-count" style="font-size:9px;color:var(--mute);flex-shrink:0">' + locCount + '</span>' : '') + (hasOA ? '<span class="tr-expand' + (locCollapsed ? '' : ' open') + '" onclick="event.stopPropagation();treeToggleGroup(\'loc-' + loc.id + '\')">\u25B6</span>' : '') + '</div>';
    h += '</div>';

    if (hasOA) {
      h += '<div class="tree-loc-group' + (locCollapsed ? ' collapsed' : '') + '">';
      (loc.officeAreas || []).forEach(function(oa) {
        var isOaActive = _treeFilter.type === 'oa' && _treeFilter.oaId === oa.id;
        var isOaPath = isLocPath && _treeFilter.oaId === oa.id;
        var oaCollapsed = _treeCollapsed.has('oa-' + oa.id);
        var hasFL = (oa.floors || []).length > 0;
        var oaCount = countRoomsInOA(loc.name, oa.name);

        h += '<div class="tree-loc-node">';
        h += '<div class="tl-header' + (isOaActive ? ' sel' : '') + '" onclick="treeSelect(\'oa\',\'' + loc.id + '\',\'' + e(loc.name) + '\',\'' + oa.id + '\',\'' + e(oa.name) + '\')"><span class="tl-icon">\uD83C\uDFE2</span><span class="tl-name">' + e(oa.name) + '</span>' + (oaCount>0 ? '<span class="tl-count">' + oaCount + '</span>' : '') + (hasFL ? '<span class="tl-arr' + (oaCollapsed ? '' : ' open') + '" onclick="event.stopPropagation();treeToggleGroup(\'oa-' + oa.id + '\')">\u25B6</span>' : '') + '</div>';
        h += '</div>';

        if (hasFL) {
          h += '<div class="tree-oa-group' + (oaCollapsed ? ' collapsed' : '') + '">';
          (oa.floors || []).forEach(function(fl) {
            var isFlActive = _treeFilter.type === 'floor' && _treeFilter.flId === fl.id;
            var flCount = countRoomsInFloor(loc.name, oa.name, fl.name);
            h += '<div class="tree-oa-node">';
            h += '<div class="to-header' + (isFlActive ? ' sel' : '') + '" onclick="treeSelect(\'floor\',\'' + loc.id + '\',\'' + e(loc.name) + '\',\'' + oa.id + '\',\'' + e(oa.name) + '\',\'' + fl.id + '\',\'' + e(fl.name) + '\')"><span class="to-icon">\uD83D\uDCCB</span><span class="to-name">' + e(fl.name) + '</span>' + (flCount>0 ? '<span class="tl-count">' + flCount + '</span>' : '') + '</div>';
            h += '</div>';
          });
          h += '</div>';
        }
      });
      h += '</div>';
    }
  });
  el.innerHTML = h;
}

// 统计房间数量
function countRoomsInLoc(locName) {
  return roomManager.rooms.filter(function(r) { return r.location === locName; }).length;
}
function countRoomsInOA(locName, oaName) {
  return roomManager.rooms.filter(function(r) { return r.location === locName && r.officeArea === oaName; }).length;
}
function countRoomsInFloor(locName, oaName, flName) {
  return roomManager.rooms.filter(function(r) { return r.location === locName && r.officeArea === oaName && r.floor === flName; }).length;
}

// 检查房间是否匹配当前筛选
function matchesFilter(room) {
  if (_treeFilter.type === 'all') return true;
  if (_treeFilter.type === 'loc') return room.location === _treeFilter.locName;
  if (_treeFilter.type === 'oa') return room.location === _treeFilter.locName && room.officeArea === _treeFilter.oaName;
  if (_treeFilter.type === 'floor') return room.location === _treeFilter.locName && room.officeArea === _treeFilter.oaName && room.floor === _treeFilter.flName;
  return true;
}

function showLocManager() {
  renderLocTree();
  document.getElementById('locModalOverlay').style.display = '';
}
function hideLocModal() { document.getElementById('locModalOverlay').style.display = 'none'; renderSideTree(); }

function addLocation() {
  var inp = document.getElementById('newLocName');
  var name = inp.value.trim();
  if (!name) return;
  if (_hier.locations.some(function(l) { return l.name === name; })) { alert('地点已存在'); return; }
  var id = 'loc-' + Date.now();
  _hier.locations.push({id: id, name: name, officeAreas: []});
  saveHierarchy(); inp.value = ''; renderLocTree(); renderSideTree();
}

function addOfficeArea(locId) {
  var inp = document.getElementById('inp-oa-' + locId);
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) return;
  var loc = _hier.locations.find(function(l) { return l.id === locId; });
  if (!loc) return;
  if ((loc.officeAreas || []).some(function(a) { return a.name === name; })) { alert('办公区已存在'); return; }
  if (!loc.officeAreas) loc.officeAreas = [];
  loc.officeAreas.push({id: 'oa-' + Date.now(), name: name, floors: []});
  saveHierarchy(); inp.value = ''; renderLocTree(); renderSideTree();
}

function addFloor(locId, oaId) {
  var inp = document.getElementById('inp-fl-' + oaId);
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) return;
  var loc = _hier.locations.find(function(l) { return l.id === locId; });
  if (!loc) return;
  var oa = (loc.officeAreas || []).find(function(a) { return a.id === oaId; });
  if (!oa) return;
  if (!oa.floors) oa.floors = [];
  if (oa.floors.some(function(f) { return f.name === name; })) { alert('楼层已存在'); return; }
  oa.floors.push({id: 'fl-' + Date.now(), name: name});
  saveHierarchy(); inp.value = ''; renderLocTree(); renderSideTree();
}

function addOnEnter(ev, fn, arg1, arg2) {
  if (ev.key === 'Enter') { if (arg2 !== undefined) fn(arg1, arg2); else fn(arg1); }
}

function deleteLocNode(type, locId, oaId, flId) {
  if (!confirm('确定删除？')) return;
  if (type === 'location') {
    _hier.locations = _hier.locations.filter(function(l) { return l.id !== locId; });
    if (_treeFilter.locId === locId) treeSelect('all');
  } else if (type === 'office') {
    var loc = _hier.locations.find(function(l) { return l.id === locId; });
    if (loc) loc.officeAreas = (loc.officeAreas || []).filter(function(a) { return a.id !== oaId; });
    if (_treeFilter.oaId === oaId) { treeSelect('loc', locId, _treeFilter.locName); }
  } else if (type === 'floor') {
    var loc2 = _hier.locations.find(function(l) { return l.id === locId; });
    if (loc2) {
      var oa2 = (loc2.officeAreas || []).find(function(a) { return a.id === oaId; });
      if (oa2) oa2.floors = (oa2.floors || []).filter(function(f) { return f.id !== flId; });
    }
    if (_treeFilter.flId === flId) { treeSelect('oa', locId, _treeFilter.locName, oaId, _treeFilter.oaName); }
  }
  saveHierarchy(); renderLocTree(); renderSideTree();
}

function renderLocTree() {
  var el = document.getElementById('locTree');

  var h = '';
  (_hier.locations || []).forEach(function(loc) {
    h += '<div class="tree-loc">';
    h += '<div class="loc-header"><span class="loc-icon">\uD83D\uDCCD</span><span class="loc-name">' + e(loc.name) + '</span><button class="loc-act del" onclick="deleteLocNode(\'location\',\'' + loc.id + '\')">\u2715 \u5220\u9664</button></div>';
    h += '<div class="loc-children">';
    (loc.officeAreas || []).forEach(function(oa) {
      h += '<div class="tree-oa">';
      h += '<div class="oa-header"><span class="oa-icon">\uD83C\uDFE2</span><span class="oa-name">' + e(oa.name) + '</span><button class="oa-act del" onclick="deleteLocNode(\'office\',\'' + loc.id + '\',\'' + oa.id + '\')">\u2715 \u5220\u9664</button></div>';
      h += '<div class="oa-children">';
      (oa.floors || []).forEach(function(fl) {
        h += '<div class="tree-fl"><div class="fl-row"><span class="fl-icon">\uD83D\uDCCB</span><span class="fl-name">' + e(fl.name) + '</span><button class="fl-act del" onclick="deleteLocNode(\'floor\',\'' + loc.id + '\',\'' + oa.id + '\',\'' + fl.id + '\')">\u2715 \u5220\u9664</button></div></div>';
      });
      h += '<div class="add-row"><input type="text" id="inp-fl-' + oa.id + '" placeholder="\u6DFB\u52A0\u697C\u5C42\uFF08\u5982\uFF1A3F\uFF09" onkeydown="addOnEnter(event, addFloor, \'' + loc.id + '\', \'' + oa.id + '\')"><button onclick="addFloor(\'' + loc.id + '\',\'' + oa.id + '\')">\u2713</button></div>';
      h += '</div></div>';
    });
    h += '<div class="add-row"><input type="text" id="inp-oa-' + loc.id + '" placeholder="\u6DFB\u52A0\u529E\u516C\u533A\uFF08\u5982\uFF1A\u671B\u4EACSOHO\uFF09" onkeydown="addOnEnter(event, addOfficeArea, \'' + loc.id + '\')"><button onclick="addOfficeArea(\'' + loc.id + '\')">\u2713</button></div>';
    h += '</div></div>';
  });
  if (!(_hier.locations || []).length) h = '<p style="color:var(--dim);font-size:13px;text-align:center;padding:20px 0">\u6682\u65E0\u5C42\u7EA7\uFF0C\u8BF7\u5728\u4E0B\u65B9\u7684\u8F93\u5165\u6846\u6DFB\u52A0\u5730\u70B9</p>';
  el.innerHTML = h;
}

// 初始化
loadHierarchy();
const videoPlayers = new Map();

function renderAll() {
  const grid = document.getElementById('roomGrid');
  grid.querySelectorAll('.card').forEach(c => c.remove());
  const es = document.getElementById('emptyState');
  if (roomManager.rooms.length === 0) { es.style.display = ''; return; }
  es.style.display = 'none';
  var filtered = roomManager.rooms.filter(function(r) { return matchesFilter(r); });
  for (const room of filtered) { grid.appendChild(createCard(room, roomManager.getState(room.id))); }
  if (filtered.length === 0 && roomManager.rooms.length > 0) {
    es.style.display = ''; es.innerHTML = '<div class="icon">🔍</div><h3>当前筛选下无房间</h3><p>点击左侧导航切换，或点击「全部直播间」查看大盘</p>';
  } else if (filtered.length > 0) {
    es.style.display = 'none';
  }
}

// ★ 更新卡片但不摧毁 video 元素 — OBS 高频回调专用
function updateAllCards() {
  const grid = document.getElementById('roomGrid');
  const es = document.getElementById('emptyState');
  var filtered = roomManager.rooms.filter(function(r) { return matchesFilter(r); });
  if (filtered.length === 0) {
    grid.querySelectorAll('.card').forEach(c => c.remove());
    if (roomManager.rooms.length === 0) { es.style.display = ''; es.innerHTML = '<div class="icon">📡</div><h3>还没有监控房间</h3><p>被监控电脑上开启 OBS WebSocket 后，<br>在大盘填写 IP、端口、密码即可实时监控。</p><button class="btn-add-main" style="margin:10px auto" onclick="showAddModal()">+ 添加第一个房间</button></div>'; }
    else { es.style.display = ''; es.innerHTML = '<div class="icon">🔍</div><h3>当前筛选下无房间</h3><p>尝试切换地点/办公区/楼层筛选</p>'; }
    return;
  }
  es.style.display = 'none';

  var existing = {}; grid.querySelectorAll('.card').forEach(function(c) {
    existing[c.id.replace('card-', '')] = c;
  });

  var filteredIds = {};
  for (var i = 0; i < filtered.length; i++) { filteredIds[filtered[i].id] = true; }
  // 移除不在筛选范围内的旧卡片
  grid.querySelectorAll('.card').forEach(function(c) {
    var cid = c.id.replace('card-', '');
    if (!filteredIds[cid]) c.remove();
  });

  for (var i = 0; i < filtered.length; i++) {
    var room = filtered[i];
    var st = roomManager.getState(room.id);
    if (!st._room) st._room = room;
    var oldCard = existing[room.id];
    var videoEl = document.getElementById('v-' + room.id);
    var isPlaying = videoEl && videoEl._flv && !videoEl.paused;

    if (isPlaying) {
      if (oldCard) {
        updateCardVisuals(oldCard, room, st);
      } else {
        grid.appendChild(createCard(room, st));
      }
    } else {
      if (oldCard) oldCard.remove();
      grid.appendChild(createCard(room, st));
    }
  }
}

function updateCardVisuals(card, room, st) {
  var dot = card.querySelector('.sdot');
  if (dot) {
    var dc = 'var(--mute)';
    if (st.status === 'connected') dc = st.streaming ? '#e74c3c' : 'var(--green)';
    else if (st.status === 'connecting') dc = 'var(--yellow)';
    else if (st.status === 'reconnecting') dc = 'var(--orange)';
    dot.style.background = dc;
  }
  if (st.alerts && st.alerts.length > 0) card.classList.add('alert'); else card.classList.remove('alert');
  if (st.status === 'offline') card.classList.add('offline'); else card.classList.remove('offline');

  var badges = card.querySelector('.status-badges');
  if (badges) {
    var bhtml = '';
    bhtml += (st.status === 'connected' && st.streaming) ? '<span class="stream-badge live">&bull; LIVE</span>' : '<span class="stream-badge off">&bull; 未推流</span>';
    bhtml += st.recording ? '<span class="stream-badge rec">&bull; REC</span>' : '';
    bhtml += st.virtualCam ? '<span class="stream-badge vcam">&bull; 虚拟摄像</span>' : '';
    badges.innerHTML = bhtml;
  }

  var hasPull = !!(st.pullUrl && st.pullUrl !== '--');
  var hint = card.querySelector('.play-hint');
  if (hint) hint.textContent = hasPull ? '点击播放拉流画面' : '未检测到拉流地址';
  var noUrl = card.querySelector('.no-url');
  if (noUrl) noUrl.style.display = hasPull ? 'none' : '';

  // 从 ghost card 提取最新 params-section 和 url-row（不动 video 元素）
  var ghost = createCard(room, st);
  var np = ghost.querySelector('.params-section');
  var nu = ghost.querySelector('.url-row');
  var op = card.querySelector('.params-section');
  var ou = card.querySelector('.url-row');
  if (op && np) op.innerHTML = np.innerHTML;
  if (ou && nu) { ou.className = nu.className; ou.innerHTML = nu.innerHTML; }

  // 更新 footer 时长
  var ft = card.querySelectorAll('.card-footer .ft');
  for (var fi = 0; fi < ft.length; fi++) ft[fi].remove();
  var cff = card.querySelector('.card-footer');
  if (cff) {
    if (st.streaming && st.streamTime > 0) {
      var sspan = document.createElement('span'); sspan.className = 'ft'; sspan.textContent = '推流 ' + fmtDur(st.streamTime); cff.appendChild(sspan);
    }
    if (st.recording && st.recordingTime > 0) {
      var rspan = document.createElement('span'); rspan.className = 'ft'; rspan.textContent = '录制 ' + fmtDur(st.recordingTime); cff.appendChild(rspan);
    }
  }
}

function createCard(room, st) {
  // Ensure st has _room reference
  if (!st._room) st._room = room;

  const card = document.createElement('div'); card.className = 'card'; card.id = 'card-' + room.id;
  if (st.alerts && st.alerts.length > 0) card.classList.add('alert');
  if (st.status === 'offline') card.classList.add('offline');

  let dc = 'var(--mute)';
  if (st.status === 'connected') dc = st.streaming ? '#e74c3c' : 'var(--green)';
  else if (st.status === 'connecting') dc = 'var(--yellow)';
  else if (st.status === 'reconnecting') dc = 'var(--orange)';

  const sl = { 'connected': st.streaming ? '推流中' : '在线', 'connecting': '连接中...', 'reconnecting': '重连中...', 'offline': '离线' }[st.status] || '离线';

  // 编码器类型判断（用于 UI 标签适配 + 模板选择）
  const encFam = encoderFamily(st.videoEncoder);
  const encTmpl = ENCODER_PARAMS[encFam] || ENCODER_PARAMS['unknown'];

  // 编码器参数模板渲染
  function _encParams() {
    var html = '';
    for (var i = 0; i < encTmpl.length; i++) {
      var p = encTmpl[i];
      var v = st[p.key] || '--';

  // 拉流地址来源标记

  // 网络质量样式

  card.innerHTML =

        '<div class="status-badges">' +
