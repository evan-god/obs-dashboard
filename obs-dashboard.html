    // ── 模块行 ──
    (function(){
      var fpsVal = (st.fpsSet ? st.fps + '/' + st.fpsSet : (st.fps || '--'));
      var fpsCls = st.fpsSet && parseInt(st.fps) < st.fpsSet * 0.7 ? 'warn' : '';
      var drCls = (st.dropRate && parseFloat(st.dropRate) > 1) ? 'bad' : ((st.dropRate && parseFloat(st.dropRate) > 0.1) ? 'warn' : 'ok');
      var dfCls = st.droppedFrames > 100 ? 'bad' : (st.droppedFrames > 10 ? 'warn' : 'ok');
      var rdrCls = (st.renderDropRate && parseFloat(st.renderDropRate) > 1) ? 'bad' : '';
      var d1 = st.droppedFrames === 0 ? 'ok' : st.droppedFrames > 50 ? 'bad' : 'warn';
      var d1v = st.droppedFrames > 0 ? st.droppedFrames + '帧' : '正常';
      var d2 = st.droppedFrames > 100 ? 'bad' : 'ok';
      var d2v = st.droppedFrames > 100 ? '疑似' : '未检测';
      var d3 = st.status === 'connected' ? 'ok' : 'warn';
      var d3v = st.status === 'connected' ? '正常' : '离线';
      var d4 = st.streaming ? 'ok' : st.status === 'connected' ? 'ok' : 'warn';
      var d4v = st.streaming ? '正常' : st.status === 'connected' ? '待推流' : '离线';
      return '<div class="params-section">' +
        // R1: 视频参数
        '<div class="module-row"><div class="m-head"><span class="m-icon">📹</span><span class="m-title">视频参数</span></div><div class="m-grid">' +
          _mi('分辨率', st.resolution) + _mi('帧率', fpsVal, fpsCls) + _mi('视频码率', st.bitrate) + _mi('编码器', st.videoEncoder || '--') +
          _mi('GOP', st.gop || '--') + _mi('渲染', st.avgRenderTime) + _encParams() +
        '</div></div>' +
        // R2: 音频参数
        '<div class="module-row"><div class="m-head"><span class="m-icon">🎵</span><span class="m-title">音频参数</span></div><div class="m-grid">' +
          _mi('编码器', st.audioEncoder || '--') + _mi('音频码率', st.audioBitrate || '--') + _mi('采样率', st.audioSampleRate || '48 kHz') +
          _mi('声道', st.audioChannels || '立体声') + _mi('CPU', st.cpu) + _mi('内存', st.memory) +
        '</div></div>' +
        // R2.5: 混音器电平（下拉选择音源 + OBS 风格电平波动条）
        (() => {
          var inputs = st.audioInputs || [];
          var sel = st.selectedAudioInput || '--';
          var mpct = Math.round((st.micLevelPeak || 0) * 100);
          var mdb = st.micMuted ? '已静音' : ((st.micLevelDbPeak !== undefined && st.micLevelDbPeak > -100) ? st.micLevelDbPeak.toFixed(1) + ' dB' : (st.micVolumeDb || '--'));
          var selHtml = inputs.length > 0
            ? '<select class="mic-select" onchange="roomManager.selectAudioInput(\'' + room.id + '\', this.value)" style="font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 4px;max-width:140px;cursor:pointer">' +
                inputs.map(function(n){ return '<option value="' + n + '"' + (n === sel ? ' selected' : '') + '>' + n + '</option>'; }).join('') +
              '</select>'
            : '<span class="pv" style="font-size:11px">' + (sel || '未检测') + '</span>';
          return '<div class="module-row"><div class="m-head"><span class="m-icon">🎤</span><span class="m-title">混音器电平</span></div><div class="m-grid">' +
            '<span class="m-item"><span class="m-label">音源</span>' + selHtml + '</span>' +
            '<span class="m-item mic-meter-item"><span class="m-label">电平</span>' +
              '<div class="mic-bar-wrap">' +
                '<div class="mic-meter">' +
                  '<div class="mic-meter-bar"><div class="mic-meter-fill" id="mic-fill-' + room.id + '" style="width:' + mpct + '%"></div></div>' +
                  '<span class="mic-meter-db' + (st.micMuted ? ' muted' : '') + '" id="mic-db-' + room.id + '">' + e(mdb) + '</span>' +
                '</div>' +
                '<div class="mic-scale">' +
                  '<span>-60</span><span>-50</span><span>-40</span><span>-30</span><span>-20</span><span>-10</span><span>-5</span><span class="s0">0</span>' +
                '</div>' +
              '</div>' +
            '</span>' +
          '</div></div>';
        })() +
        // R3: 网络质量
        '<div class="module-row"><div class="m-head"><span class="m-icon">📶</span><span class="m-title">网络质量</span></div><div class="m-grid">' +
          _mi('网络质量', st.networkQuality || '--', nqClass) + _mi('网络丢帧率', st.dropRate || '--', drCls) +
          _mi('丢帧数', st.droppedFrames > 0 ? st.droppedFrames + ' 帧' : '正常', dfCls) +
          _mi('输出总帧', st.outputTotalFrames > 0 ? st.outputTotalFrames.toLocaleString() : '--') +
          _mi('渲染丢帧率', st.renderDropRate || '--', rdrCls) + _mi('磁盘剩余', st.disk || '--') +
        '</div></div>' +
        // R4: 音视频监控
        '<div class="module-row detect-row"><div class="m-head"><span class="m-icon">🛡</span><span class="m-title">音视频监控</span></div><div class="m-grid">' +
          _md('画面丢帧', d1, d1v) + _md('花屏检测', d2, d2v) + _md('声音反向', d3, d3v) + _md('音画同步', d4, d4v) +
        '</div></div>' +
      '</div>' +
      '<div class="url-row">' +
        '<div class="url-item"><span class="ul">🚀 推流地址</span><span class="uv" id="push-' + room.id + '" title="' + e(st.pushUrl) + '">' + e(st.pushUrl) + '</span><button class="copy-btn" onclick="copyText(\'' + e(st.pushUrl) + '\')">复制</button></div>' +
        '<div class="url-item"><span class="ul">📡 拉流地址</span><span class="uv ' + pullClass + '" id="pull-' + room.id + '" title="' + e(st.pullUrl) + '">' + e(st.pullUrl || '--') + (isPullManual ? ' [手动]' : (hasPull ? ' [自动]' : '')) + '</span>' + (hasPull ? '<button class="copy-btn" onclick="copyText(\'' + e(st.pullUrl) + '\')">复制</button>' : '') + '</div>' +
      '</div>';
    })() +
    '<div class="card-footer">' +
      '<span class="fi">' + e(room.host) + ':' + room.port + '</span>' +
      (st.streaming && st.streamTime > 0 ? '<span class="ft">推流 ' + fmtDur(st.streamTime) + '</span>' : '') +
      (st.recording && st.recordingTime > 0 ? '<span class="ft">录制 ' + fmtDur(st.recordingTime) + '</span>' : '') +
    '</div>';
  return card;
}

// 模块行参数项（label: value）
function _mi(label, value, cls) {
  return '<span class="m-item"><span class="m-label">' + label + '</span><span class="m-value' + (cls ? ' ' + cls : '') + '">' + (value || '--') + '</span></span>';
}
// 模块行检测项（带状态圆点）
function _md(label, cls, val) {
  return '<span class="m-item"><span class="m-dot ' + cls + '"></span><span class="m-label">' + label + '</span><span class="m-value ' + cls + '">' + val + '</span></span>';
}
// 保留旧函数供其他调用
function _pi(label, value, cls) {
  return '<div class="param-item"><span class="pl">' + label + '</span><span class="pv' + (cls ? ' ' + cls : '') + '">' + (value || '--') + '</span></div>';
}

var _toggleDebounce = {};
function togglePlay(id) {
  // 500ms 防抖，防止快速点击堆叠
  var now = Date.now();
  if (_toggleDebounce[id] && now - _toggleDebounce[id] < 500) return;
  _toggleDebounce[id] = now;

  const room = roomManager.get(id); if (!room) return;
  const v = document.getElementById('v-' + id), ov = document.getElementById('ov-' + id), pb = document.getElementById('pb-' + id), ph = document.getElementById('ph-' + id);
  const st = roomManager.getState(id);

  // 如果已经在播放，则停止并彻底清理
  const isPlaying = (v._flv || v._hls || (v.src && !v.paused));
  if (isPlaying) {
    if (v._flv) {
      try { v._flv.detachMediaElement(); } catch(e) {}
      try { v._flv.destroy(); } catch(e) {}
      v._flv = null;
    }
    if (v._hls) {
      try { v._hls.stopLoad(); } catch(e) {}
      try { v._hls.destroy(); } catch(e) {}
      v._hls = null;
    }
    if (v._flvHeartbeat) { clearInterval(v._flvHeartbeat); v._flvHeartbeat = null; }
    v.pause();
    v.onstalled = null; v.onwaiting = null; v.onplaying = null;
    v.style.display = 'none'; ov.style.display = '';
    pb.textContent = '\u25B6'; ph.textContent = '已暂停';
    return;
  }

  // 直接取拉流地址：手动填写 > 自动推断的 FLV
  let url = null;
  if (room.pullUrl && room.pullUrl.trim()) {
    url = room.pullUrl.trim();
  } else if (st.pullUrl && st.pullUrl !== '--') {
    url = st.pullUrl;
  } else if (st.pushUrl && st.pushUrl !== '--') {
    // 实时推断，取第一个 FLV
    const freshCands = inferPullUrl(st.pushUrl, room.platform);
    url = freshCands.length > 0 ? freshCands[0] : null;
  }

  if (!url) {
    alert('未检测到拉流地址，请确认推流已启动、平台选择正确');
    return;
  }

  pb.textContent = '\u22EF';
  ph.textContent = '正在连接拉流...';
  startPlayback(v, ov, pb, ph, url);
}

function startPlayback(v, ov, pb, ph, url) {
  // 清理旧播放器
  if (v._flv) { try { v._flv.destroy(); } catch(e) {} v._flv = null; }
  if (v._hls) { try { v._hls.destroy(); } catch(e) {} v._hls = null; }
  v.src = '';
  v.style.display = '';
  v.muted = true;

  const isFlv = url.endsWith('.flv') || url.includes('inzego.com') || url.includes('zego') || url.includes('.flv?');
  const isHls = url.endsWith('.m3u8');

  if (isFlv && (window.flvjs && flvjs.isSupported())) {
    // ═══ flv.js 播放 HTTP-FLV（即构等 RTMP→FLV 场景） ═══
    playWithFlv(v, ov, pb, ph, url);
  } else if (isHls && window.Hls && Hls.isSupported()) {
    // ═══ HLS.js 播放 HLS ═══
    playWithHls(v, ov, pb, ph, url);
  } else {
    // ═══ 直接 src 播放 ═══
    v.src = url;
    v.play().then(() => {
      v.style.display = ''; ov.style.display = 'none';
      pb.textContent = '\u23F8'; ph.textContent = '正在播放拉流画面';
    }).catch(e => {
      console.log('[Play] Error:', e.message);
      v.src = '';
      ov.style.display = ''; pb.textContent = '\u25B6';
      ph.textContent = '播放失败: ' + (e.message || '未知错误');
    });
  }
}

function playWithFlv(v, ov, pb, ph, url) {
  let player = null, retries = 0;
  const MAX = 20;

  function create() {
    // 清理旧播放器但不 detach，保持 video 画面不黑
    if (player) {
      try { player.destroy(); } catch(e) {}
      player = null;
    }
    v._flv = null;

    player = flvjs.createPlayer({
      type: 'flv', url: url, isLive: true,
      hasAudio: true, hasVideo: true,
      enableStashBuffer: true,
      stashInitialSize: 384,
      autoCleanupSourceBuffer: true,
      autoCleanupMaxBackwardDuration: 10,
      autoCleanupMinBackwardDuration: 5
    }, { enableWorker: false });

    player.attachMediaElement(v);
    player.load();
    v._flv = player;

    player.on(flvjs.Events.METADATA_ARRIVED, () => { retries = 0; });

    // ★ 关键修复：LOADING_COMPLETE 时只 load()，不 unload()
    // unload() 会清零缓冲导致黑屏，load() 直接续流不闪
    player.on(flvjs.Events.LOADING_COMPLETE, () => {
      console.warn('[FLV] 流断开');
      retries++;
      if (retries > MAX) {
        if (player) { try { player.destroy(); } catch(e) {} player = null; v._flv = null; }
        v.style.display = 'none'; ov.style.display = '';
        pb.textContent = '\u25B6'; ph.textContent = '直播流断开';
        return;
      }
      ph.textContent = '重连 (' + retries + ')';
      player.load();
      v.play().catch(() => {});
    });

    // ERROR → 销毁重建（不 detach，保持 video 不闪）
    player.on(flvjs.Events.ERROR, (t, info) => {
      console.warn('[FLV] 错误:', t, info);
      retries++;
      if (retries > MAX) {
        if (player) { try { player.destroy(); } catch(e) {} player = null; v._flv = null; }
        v.style.display = 'none'; ov.style.display = '';
        pb.textContent = '\u25B6'; ph.textContent = '播放失败';
        return;
      }
      ph.textContent = '重连 (' + retries + '/' + MAX + ')';
      setTimeout(() => { if (v._flv) create(); }, 1500);
    });

    v.play().then(() => {
      ov.style.display = 'none'; v.style.display = '';
      pb.textContent = '\u23F8'; ph.textContent = 'FLV 直播中';
    }).catch(() => {});

    // ★ 心跳检测：currentTime 连续 3 次不变 → 自动重连
    if (v._flvHeartbeat) clearInterval(v._flvHeartbeat);
    let lastTime = -1, stallC = 0;
    v._flvHeartbeat = setInterval(() => {
      if (!v._flv || v.paused || v.style.display === 'none') return;
      if (v.currentTime === lastTime) {
        stallC++;
        if (stallC >= 3) {
          console.warn('[FLV] 心跳超时，重连');
          stallC = 0; lastTime = -1;
          player.load();
          v.play().catch(function(){});
          ph.textContent = 'FLV 直播中 (重连)';
        }
      } else { stallC = 0; }
      lastTime = v.currentTime;
    }, 4000);
  }

  create();
}

function playWithHls(v, ov, pb, ph, url) {
  let recoverCount = 0;
  const MAX_RECOVER = 8;
  let recoveryTimer = null;

  function createHls() {
    if (v._hls) { try { v._hls.destroy(); } catch(e) {} v._hls = null; }
    const h = new Hls({
      liveSyncDurationCount: 6,
      liveMaxLatencyDurationCount: 12,
      maxBufferLength: 40,
      maxMaxBufferLength: 120,
      startPosition: -1,
      manifestLoadingMaxRetry: 4,
      manifestLoadingRetryDelay: 800,
      levelLoadingMaxRetry: 6,
      levelLoadingRetryDelay: 800,
      fragLoadingMaxRetry: 8,
      fragLoadingRetryDelay: 400,
      enableWorker: false
    });
    v._hls = h;

    h.on(Hls.Events.MANIFEST_PARSED, () => {
      v.style.display = '';
      v.muted = true;
      const p = v.play();
      if (p) p.then(() => {
        ov.style.display = 'none';
        pb.textContent = '\u23F8';
        ph.textContent = '正在播放拉流画面 (HLS)';
        recoverCount = 0;
      }).catch(e => {
        console.warn('[HLS] autoplay blocked:', e.message);
        ph.textContent = '点击画面开始播放';
      });
    });

    h.on(Hls.Events.FRAG_BUFFERED, () => {
      if (v.paused && h.media && h.media.readyState >= 2) {
        v.play().then(() => {
          ov.style.display = 'none';
          v.style.display = '';
          pb.textContent = '\u23F8';
        }).catch(() => {});
      }
    });

    h.on(Hls.Events.ERROR, (event, data) => {
      console.warn('[HLS] Error:', data.type, data.details, data.fatal ? 'FATAL' : 'non-fatal');
      if (!data.fatal) {
        if (data.details === 'bufferStalledError' || data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          v.play().catch(() => {});
        }
        return;
      }
      recoverCount++;
      console.error('[HLS] Fatal #' + recoverCount, data.type, data.details);
      if (recoverCount > MAX_RECOVER) {
        console.error('[HLS] Giving up after', recoverCount, 'fatal errors');
        h.destroy(); v._hls = null;
        v.src = ''; v.style.display = 'none';
        ov.style.display = ''; pb.textContent = '\u25B6';
        ph.textContent = 'HLS 持续故障';
        return;
      }
      ph.textContent = '自动重连 (' + recoverCount + '/' + MAX_RECOVER + ')...';
      const delay = Math.min(500 * recoverCount, 4000);
      if (recoveryTimer) clearTimeout(recoveryTimer);
      recoveryTimer = setTimeout(() => {
        console.log('[HLS] Recreating instance...');
        createHls();
        h.loadSource(url);
        h.attachMedia(v);
        v.style.display = '';
      }, delay);
    });

    return h;
  }

  const hls = createHls();
  hls.loadSource(url);
  hls.attachMedia(v);
}

function altPlayback(v, ov, pb, ph) {

  document.getElementById('sumTotal').textContent = t;
  document.getElementById('sumOnline').textContent = o;
  document.getElementById('sumStreaming').textContent = s;
  document.getElementById('sumAlerts').textContent = a;
}

function hideModal() { document.getElementById('modalOverlay').style.display = 'none'; editingId = null; }
function cf() {
  document.getElementById('fldName').value = ''; document.getElementById('fldHost').value = '';
  document.getElementById('fldPort').value = '4455'; document.getElementById('fldPass').value = '';
  document.getElementById('fldPlatform').value = '自有平台'; document.getElementById('fldPullUrl').value = '';
  document.getElementById('fldLocation').value = ''; document.getElementById('fldOffice').value = ''; document.getElementById('fldFloor').value = '';
}
function saveRoom() {
  const d = {
    name: document.getElementById('fldName').value.trim(),
    host: document.getElementById('fldHost').value.trim(),
    port: parseInt(document.getElementById('fldPort').value) || 4455,
    password: document.getElementById('fldPass').value,
    platform: document.getElementById('fldPlatform').value,
    pullUrl: document.getElementById('fldPullUrl').value.trim(),
    location: document.getElementById('fldLocation').value.trim() || '',
    officeArea: document.getElementById('fldOffice').value.trim() || '',
    floor: document.getElementById('fldFloor').value.trim() || ''
  };
  if (!d.name) { alert('请填写房间名称'); return; } if (!d.host) { alert('请填写 OBS WebSocket 地址'); return; }
  if (editingId) { roomManager.disconnect(editingId); roomManager.update(editingId, d); const r = roomManager.get(editingId); if (r) roomManager.connect(r); }
  else { const r = roomManager.add(d); roomManager.connect(r); }
  hideModal(); renderAll(); renderSideTree(); updateSummary();
}
function deleteRoom() { if (!editingId) return; if (!confirm('确定删除房间 "' + roomManager.get(editingId)?.name + '" 吗？')) return; roomManager.remove(editingId); hideModal(); renderAll(); renderSideTree(); updateSummary(); }
function reconnectRoom(id) { roomManager.disconnect(id); const r = roomManager.get(id); if (r) roomManager.connect(r); updateAllCards(); }

// ═══════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════
function e(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function populateDatalists() {
  var dc = document.getElementById('dlLocation'); if (dc) {
    dc.innerHTML = '';
    getAllLocNames().forEach(function(n) { dc.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
    // 也补充房间中已有的（不在层级中的）
    roomManager.rooms.forEach(function(r) { if (r.location && getAllLocNames().indexOf(r.location) < 0) dc.innerHTML += '<option value="' + r.location + '">' + r.location + '</option>'; });
  }
  var doEl = document.getElementById('dlOffice'); if (doEl) {
    doEl.innerHTML = '';
    getAllOfficeNames().forEach(function(n) { doEl.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
    roomManager.rooms.forEach(function(r) { if (r.officeArea && getAllOfficeNames().indexOf(r.officeArea) < 0) doEl.innerHTML += '<option value="' + r.officeArea + '">' + r.officeArea + '</option>'; });
  }
  var df = document.getElementById('dlFloor'); if (df) {
    df.innerHTML = '';
    getAllFloorNames().forEach(function(n) { df.innerHTML += '<option value="' + n + '">' + n + '</option>'; });
    roomManager.rooms.forEach(function(r) { if (r.floor && getAllFloorNames().indexOf(r.floor) < 0) df.innerHTML += '<option value="' + r.floor + '">' + r.floor + '</option>'; });
  }
}
function fmtDur(ms) { const sec = Math.floor(ms / 1000), h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60; if (h > 0) return h + 'h ' + m + 'm'; if (m > 0) return m + 'm ' + s + 's'; return s + 's'; }
function copyText(t) {
  if (!t || t === '--') return;
  navigator.clipboard.writeText(t).then(() => {
    const btn = event.target; btn.textContent = '已复制'; setTimeout(() => btn.textContent = '复制', 1500);
  }).catch(() => {});
}

// ═══════════════════════════════════════
// 启动
// ═══════════════════════════════════════
document.addEventListener('keydown', e => { const m = document.getElementById('modalOverlay'); if (m.style.display === 'none') return; if (e.key === 'Escape') { hideModal(); return; } if (e.key === 'Enter') { saveRoom(); return; } });
window.addEventListener('beforeunload', () => { for (const [id, c] of roomManager.connections) c.destroy(); });
setInterval(() => { updateAllCards(); updateSummary(); }, 3000);
roomManager.connectAll(); renderAll(); renderSideTree(); updateSummary();

// ═══ 日志小部件 ═══
var _logMsgs = [];
var _logPersist = []; // 持久记录（内存）

// 拦截所有 console.log/warn/error 写入日志持久存储
(function() {
  var _origLog = console.log, _origWarn = console.warn, _origErr = console.error;
  function _cap(type, args) {
    var now = new Date().toLocaleTimeString();
    var msg = '[' + now + '] ' + type + ': ' + Array.prototype.slice.call(args).map(function(a) {
      try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); }
    }).join(' ');
    _logPersist.unshift(msg);
    if (_logPersist.length > 1000) _logPersist.length = 1000;
  }
  console.log = function() { _cap('LOG', arguments); _origLog.apply(console, arguments); };
  console.warn = function() { _cap('WARN', arguments); _origWarn.apply(console, arguments); };
  console.error = function() { _cap('ERROR', arguments); _origErr.apply(console, arguments); };
})();

function _diag(t, msg) {
  var now = new Date().toLocaleTimeString();
  var line = '[' + now + '] ' + t + ': ' + msg;
  _logMsgs.unshift(line);
  if (_logMsgs.length > 100) _logMsgs.length = 100;
  _logPersist.unshift(line);
  if (_logPersist.length > 500) _logPersist.length = 500;
  var el = document.getElementById('logLines');
  if (el) el.textContent = _logMsgs.join('\n');
  console.log('[DIAG]', t, msg);
}

function toggleLogWidget() {
  var w = document.getElementById('logWidget');
  w.classList.toggle('collapsed');
  var icon = document.getElementById('logToggleIcon');
  icon.textContent = w.classList.contains('collapsed') ? '\u25B6' : '\u25BC';
}

function saveLog() {
  var ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  var filename = 'obs-dashboard-' + ts + '.log';
  var blob = new Blob([_logPersist.join('\n')], { type: 'text/plain' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  _diag('SAVE', '日志已下载 → ' + filename);
}
setTimeout(function() {
  _diag('INIT', '日志就绪 — 点击左侧边栏底部「💾 下载日志」导出');
}, 1500);
